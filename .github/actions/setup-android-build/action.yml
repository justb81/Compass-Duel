name: Setup Android Build
description: >
  Composite action shared by build-android.yml and release.yml.
  Configures JDK 17 (Temurin) and sets up Gradle with caching.
  The calling workflow must check out the repository before invoking
  this action (local composite actions require the workspace to already
  be populated).

runs:
  using: composite
  steps:
    # Verify the checked-in gradle-wrapper.jar against Gradle's published list of
    # known-good wrapper hashes before it executes with build privileges (and, in
    # release.yml, with access to signing secrets). A tampered wrapper JAR would
    # otherwise run arbitrary code on the runner. Lives in the same gradle/actions
    # repo as setup-gradle, so it reuses the pinned SHA below.
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # setup-gradle manages Gradle's user home (caches, configuration cache,
    # wrapper) via its built-in caching layer keyed on Gradle and build
    # inputs; no supplementary actions/cache step is needed.
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
